<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVD Bounce Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .dvd-logo {
            position: absolute;
            width: 120px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #ff0080, #ff8c00);
            border-radius: 5px;
            animation: bounce 4s infinite linear;
        }

        @keyframes bounce {
            0% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(680px, 0);
            }
            50% {
                transform: translate(680px, 520px);
            }
            75% {
                transform: translate(0, 520px);
            }
            100% {
                transform: translate(0, 0);
            }
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dvd-logo">DVD</div>
        <div class="info">Press F12 to customize the animation</div>
    </div>
</body>
</html>
