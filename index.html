<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVD Bounce Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: black;
        }
        #dvd {
            width: 200px;
            animation: bounce 5s linear infinite;
        }
        @keyframes bounce {
            0% {transform: translate(0, 0);}
            25% {transform: translate(100vw, 0);}
            50% {transform: translate(100vw, 100vh);}
            75% {transform: translate(0, 100vh);}
            100% {transform: translate(0, 0);}
        }
    </style>
</head>
<body>
    <img id="dvd" src="https://upload.wikimedia.org/wikipedia/en/0/00/DVD_Logo.png" alt="DVD Logo">
</body>
</html>
